<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">比對完後給出車子的 GPS 數值</title>
  <desc id="desc">示意完成影像比對後，系統把車輛位置投影回地圖座標，輸出車輛 GPS、方格 ID 與信心分數。</desc>
  <defs>
    <linearGradient id="mapBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9f2df"/>
      <stop offset="1" stop-color="#b8dfc8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="48" y="54" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="28" font-weight="700" fill="#0f172a">5. 比對完成後輸出車子的 GPS</text>
  <text x="48" y="86" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="15" fill="#475569">把車輛在最佳匹配方格中的像素位置，轉換成地理座標並顯示在地圖上。</text>

  <g transform="translate(72 112)" filter="url(#shadow)">
    <rect x="0" y="0" width="580" height="360" rx="8" fill="url(#mapBg)" stroke="#334155" stroke-width="2"/>
    <path d="M20 260 C122 215 190 224 286 164 C380 106 468 112 558 60" fill="none" stroke="#64748b" stroke-width="42" stroke-linecap="round"/>
    <path d="M20 260 C122 215 190 224 286 164 C380 106 468 112 558 60" fill="none" stroke="#e2e8f0" stroke-width="4" stroke-dasharray="15 17" stroke-linecap="round"/>
    <path d="M410 350 C402 268 430 210 500 118" fill="none" stroke="#64748b" stroke-width="30" stroke-linecap="round"/>
    <path d="M410 350 C402 268 430 210 500 118" fill="none" stroke="#e2e8f0" stroke-width="3" stroke-dasharray="12 14" stroke-linecap="round"/>
    <rect x="88" y="68" width="66" height="38" rx="4" fill="#94a3b8" opacity="0.7"/>
    <rect x="172" y="65" width="50" height="76" rx="4" fill="#94a3b8" opacity="0.7"/>
    <rect x="354" y="238" width="75" height="50" rx="4" fill="#94a3b8" opacity="0.7"/>
    <g stroke="#2563eb" stroke-width="1.5" opacity="0.55">
      <path d="M72 0 V360"/>
      <path d="M144 0 V360"/>
      <path d="M216 0 V360"/>
      <path d="M288 0 V360"/>
      <path d="M360 0 V360"/>
      <path d="M432 0 V360"/>
      <path d="M504 0 V360"/>
      <path d="M0 60 H580"/>
      <path d="M0 120 H580"/>
      <path d="M0 180 H580"/>
      <path d="M0 240 H580"/>
      <path d="M0 300 H580"/>
    </g>
    <rect x="288" y="180" width="72" height="60" fill="#fde68a" stroke="#ca8a04" stroke-width="4" opacity="0.7"/>
    <g transform="translate(329 207) rotate(-20)">
      <rect x="-22" y="-12" width="44" height="24" rx="5" fill="#1e293b"/>
      <circle cx="-14" cy="14" r="4" fill="#0f172a"/>
      <circle cx="14" cy="14" r="4" fill="#0f172a"/>
    </g>
    <circle cx="329" cy="207" r="8" fill="#dc2626" stroke="#ffffff" stroke-width="3"/>
    <line x1="329" y1="207" x2="496" y2="102" stroke="#dc2626" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="388" y="42" width="178" height="70" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <text x="404" y="68" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="15" font-weight="700" fill="#991b1b">車輛定位點</text>
    <text x="404" y="92" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="13" fill="#475569">grid_id = D04</text>
    <rect x="0" y="0" width="580" height="360" rx="8" fill="none" stroke="#0f172a" stroke-width="3"/>
  </g>

  <g transform="translate(690 124)" font-family="Arial, 'Noto Sans TC', sans-serif" filter="url(#shadow)">
    <rect x="0" y="0" width="220" height="268" rx="12" fill="#ffffff" stroke="#16a34a" stroke-width="3"/>
    <text x="22" y="38" font-size="20" font-weight="700" fill="#14532d">定位結果</text>
    <line x1="22" y1="56" x2="198" y2="56" stroke="#dcfce7" stroke-width="3"/>
    <text x="22" y="88" font-size="14" font-weight="700" fill="#334155">vehicle_id</text>
    <text x="22" y="110" font-size="15" fill="#475569">veh_0007</text>
    <text x="22" y="144" font-size="14" font-weight="700" fill="#334155">GPS</text>
    <text x="22" y="168" font-size="18" font-weight="700" fill="#0f172a">25.012384</text>
    <text x="22" y="194" font-size="18" font-weight="700" fill="#0f172a">121.543276</text>
    <text x="22" y="228" font-size="14" font-weight="700" fill="#334155">confidence</text>
    <text x="22" y="250" font-size="16" fill="#16a34a">0.87</text>
  </g>

  <g transform="translate(690 418)" font-family="Arial, 'Noto Sans TC', sans-serif">
    <rect x="0" y="0" width="220" height="54" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <text x="18" y="23" font-size="13" font-weight="700" fill="#713f12">注意</text>
    <text x="18" y="42" font-size="12" fill="#713f12">此 GPS 為示意數值，實作時由實際地圖轉換得到。</text>
  </g>
</svg>
