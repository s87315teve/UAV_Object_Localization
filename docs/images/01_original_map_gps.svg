<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">原始地圖和四個角的 GPS</title>
  <desc id="desc">示意目標區域的原始地圖，四個角分別標出 GPS 座標，作為後續影像定位的地理參考基準。</desc>
  <defs>
    <linearGradient id="mapBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9f2df"/>
      <stop offset="1" stop-color="#b8dfc8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <marker id="pin" markerWidth="12" markerHeight="12" refX="6" refY="6" orient="auto">
      <circle cx="6" cy="6" r="4.5" fill="#dc2626" stroke="#ffffff" stroke-width="2"/>
    </marker>
  </defs>
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="48" y="54" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="28" font-weight="700" fill="#0f172a">1. 原始地圖和四個角的 GPS</text>
  <text x="48" y="86" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="15" fill="#475569">先取得目標區域的地圖影像，並記錄四個角的地理座標。</text>

  <g transform="translate(110 108)" filter="url(#shadow)">
    <rect x="0" y="0" width="740" height="370" rx="8" fill="url(#mapBg)" stroke="#334155" stroke-width="2"/>
    <path d="M30 270 C150 220 230 235 350 170 C470 105 585 115 710 64" fill="none" stroke="#64748b" stroke-width="46" stroke-linecap="round"/>
    <path d="M30 270 C150 220 230 235 350 170 C470 105 585 115 710 64" fill="none" stroke="#e2e8f0" stroke-width="4" stroke-dasharray="16 18" stroke-linecap="round"/>
    <path d="M520 360 C510 270 540 210 630 120" fill="none" stroke="#64748b" stroke-width="32" stroke-linecap="round"/>
    <path d="M520 360 C510 270 540 210 630 120" fill="none" stroke="#e2e8f0" stroke-width="3" stroke-dasharray="12 14" stroke-linecap="round"/>
    <rect x="95" y="75" width="76" height="42" rx="4" fill="#94a3b8" opacity="0.7"/>
    <rect x="188" y="72" width="55" height="82" rx="4" fill="#94a3b8" opacity="0.7"/>
    <rect x="80" y="145" width="110" height="50" rx="4" fill="#cbd5e1" opacity="0.8"/>
    <rect x="435" y="245" width="80" height="55" rx="4" fill="#94a3b8" opacity="0.7"/>
    <rect x="575" y="255" width="95" height="48" rx="4" fill="#cbd5e1" opacity="0.8"/>
    <circle cx="250" cy="285" r="34" fill="#86efac" opacity="0.8"/>
    <circle cx="300" cy="305" r="22" fill="#86efac" opacity="0.8"/>
    <circle cx="625" cy="75" r="24" fill="#86efac" opacity="0.8"/>
    <circle cx="690" cy="190" r="30" fill="#86efac" opacity="0.8"/>
    <rect x="0" y="0" width="740" height="370" rx="8" fill="none" stroke="#0f172a" stroke-width="3"/>
  </g>

  <g font-family="Arial, 'Noto Sans TC', sans-serif">
    <line x1="110" y1="108" x2="80" y2="84" stroke="#dc2626" stroke-width="3" marker-end="url(#pin)"/>
    <rect x="34" y="100" width="220" height="58" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <text x="48" y="124" font-size="15" font-weight="700" fill="#991b1b">左上角 GPS</text>
    <text x="48" y="148" font-size="14" fill="#334155">25.013200, 121.542000</text>

    <line x1="850" y1="108" x2="878" y2="82" stroke="#dc2626" stroke-width="3" marker-end="url(#pin)"/>
    <rect x="700" y="100" width="226" height="58" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <text x="714" y="124" font-size="15" font-weight="700" fill="#991b1b">右上角 GPS</text>
    <text x="714" y="148" font-size="14" fill="#334155">25.013200, 121.544800</text>

    <line x1="110" y1="478" x2="78" y2="500" stroke="#dc2626" stroke-width="3" marker-end="url(#pin)"/>
    <rect x="34" y="405" width="220" height="58" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <text x="48" y="429" font-size="15" font-weight="700" fill="#991b1b">左下角 GPS</text>
    <text x="48" y="453" font-size="14" fill="#334155">25.011000, 121.542000</text>

    <line x1="850" y1="478" x2="882" y2="500" stroke="#dc2626" stroke-width="3" marker-end="url(#pin)"/>
    <rect x="700" y="405" width="226" height="58" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <text x="714" y="429" font-size="15" font-weight="700" fill="#991b1b">右下角 GPS</text>
    <text x="714" y="453" font-size="14" fill="#334155">25.011000, 121.544800</text>
  </g>

  <g transform="translate(808 180)" font-family="Arial, 'Noto Sans TC', sans-serif">
    <circle cx="28" cy="28" r="25" fill="#ffffff" stroke="#334155" stroke-width="2"/>
    <path d="M28 10 L35 29 L28 25 L21 29 Z" fill="#0f172a"/>
    <text x="23" y="68" font-size="14" font-weight="700" fill="#0f172a">N</text>
  </g>
</svg>
