<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">把車子和周遭環境拿去和原始地圖比對</title>
  <desc id="desc">示意從任務影像中擷取車輛周遭地面區塊，並與原始地圖中的候選方格做影像特徵比對。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#2563eb"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="48" y="54" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="28" font-weight="700" fill="#0f172a">4. 車子周遭環境和原始地圖比對</text>
  <text x="48" y="86" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="15" fill="#475569">不要只比車子本體，而是比道路線、地面紋理與固定地物，找到最接近的地圖位置。</text>

  <g transform="translate(52 132)" filter="url(#shadow)">
    <rect x="0" y="0" width="330" height="260" rx="8" fill="#dcfce7" stroke="#334155" stroke-width="2"/>
    <text x="18" y="32" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="18" font-weight="700" fill="#0f172a">任務影像裁切</text>
    <path d="M30 190 C95 152 160 160 220 112 C260 82 292 72 315 60" fill="none" stroke="#64748b" stroke-width="52" stroke-linecap="round"/>
    <path d="M30 190 C95 152 160 160 220 112 C260 82 292 72 315 60" fill="none" stroke="#e2e8f0" stroke-width="5" stroke-dasharray="16 16" stroke-linecap="round"/>
    <rect x="70" y="72" width="50" height="36" rx="4" fill="#94a3b8" opacity="0.75"/>
    <rect x="242" y="160" width="58" height="40" rx="4" fill="#94a3b8" opacity="0.75"/>
    <g transform="translate(169 130) rotate(-20)">
      <rect x="-22" y="-12" width="44" height="24" rx="5" fill="#1e293b"/>
      <circle cx="-14" cy="14" r="4" fill="#0f172a"/>
      <circle cx="14" cy="14" r="4" fill="#0f172a"/>
    </g>
    <rect x="108" y="70" width="145" height="126" fill="none" stroke="#dc2626" stroke-width="4" stroke-dasharray="10 8"/>
    <text x="116" y="218" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="13" fill="#991b1b">擷取車輛周遭環境</text>
  </g>

  <path d="M410 260 C460 260 475 260 520 260" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <g transform="translate(414 210)" font-family="Arial, 'Noto Sans TC', sans-serif">
    <rect x="0" y="0" width="104" height="42" rx="21" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="22" y="27" font-size="14" font-weight="700" fill="#1e3a5f">特徵比對</text>
  </g>

  <g transform="translate(548 132)" filter="url(#shadow)">
    <rect x="0" y="0" width="360" height="260" rx="8" fill="#d9f2df" stroke="#334155" stroke-width="2"/>
    <text x="18" y="32" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="18" font-weight="700" fill="#0f172a">原始地圖候選區</text>
    <path d="M20 200 C95 150 150 166 218 108 C266 68 315 66 345 44" fill="none" stroke="#64748b" stroke-width="52" stroke-linecap="round"/>
    <path d="M20 200 C95 150 150 166 218 108 C266 68 315 66 345 44" fill="none" stroke="#e2e8f0" stroke-width="5" stroke-dasharray="16 16" stroke-linecap="round"/>
    <rect x="78" y="70" width="50" height="36" rx="4" fill="#94a3b8" opacity="0.75"/>
    <rect x="252" y="160" width="58" height="40" rx="4" fill="#94a3b8" opacity="0.75"/>
    <g stroke="#2563eb" stroke-width="1.6" opacity="0.72">
      <path d="M90 46 V232"/>
      <path d="M180 46 V232"/>
      <path d="M270 46 V232"/>
      <path d="M20 92 H340"/>
      <path d="M20 154 H340"/>
      <path d="M20 216 H340"/>
    </g>
    <rect x="104" y="68" width="155" height="132" fill="#fde68a" stroke="#ca8a04" stroke-width="4" opacity="0.7"/>
    <circle cx="181" cy="134" r="6" fill="#dc2626" stroke="#ffffff" stroke-width="2"/>
    <text x="122" y="222" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="13" fill="#713f12">最佳匹配方格: D04</text>
  </g>

  <g transform="translate(80 430)" font-family="Arial, 'Noto Sans TC', sans-serif">
    <rect x="0" y="0" width="800" height="58" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="22" y="25" font-size="15" font-weight="700" fill="#0f172a">比對依據</text>
    <text x="22" y="46" font-size="14" fill="#475569">道路曲線、車道線方向、建物位置、路面紋理與候選方格中的固定地物共同決定最佳匹配。</text>
  </g>
</svg>
