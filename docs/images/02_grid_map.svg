<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">把原始地圖切成很多小框框</title>
  <desc id="desc">示意把地理參考地圖切成多個小方格，每個方格都有 grid ID、GPS 範圍與中心點座標。</desc>
  <defs>
    <linearGradient id="mapBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9f2df"/>
      <stop offset="1" stop-color="#b8dfc8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="48" y="54" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="28" font-weight="700" fill="#0f172a">2. 把原始地圖切成很多小框框</text>
  <text x="48" y="86" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="15" fill="#475569">每個小框保存四角 GPS、中心 GPS、影像範圍與鄰近方格。</text>

  <g transform="translate(74 112)" filter="url(#shadow)">
    <rect x="0" y="0" width="640" height="360" rx="8" fill="url(#mapBg)" stroke="#334155" stroke-width="2"/>
    <path d="M25 260 C135 215 205 225 305 165 C410 104 510 112 615 60" fill="none" stroke="#64748b" stroke-width="42" stroke-linecap="round"/>
    <path d="M25 260 C135 215 205 225 305 165 C410 104 510 112 615 60" fill="none" stroke="#e2e8f0" stroke-width="4" stroke-dasharray="15 17" stroke-linecap="round"/>
    <path d="M450 350 C442 268 470 210 548 118" fill="none" stroke="#64748b" stroke-width="30" stroke-linecap="round"/>
    <path d="M450 350 C442 268 470 210 548 118" fill="none" stroke="#e2e8f0" stroke-width="3" stroke-dasharray="12 14" stroke-linecap="round"/>
    <rect x="88" y="68" width="74" height="42" rx="4" fill="#94a3b8" opacity="0.7"/>
    <rect x="176" y="65" width="52" height="78" rx="4" fill="#94a3b8" opacity="0.7"/>
    <rect x="390" y="238" width="78" height="52" rx="4" fill="#94a3b8" opacity="0.7"/>
    <rect x="520" y="248" width="86" height="44" rx="4" fill="#cbd5e1" opacity="0.8"/>
    <g stroke="#2563eb" stroke-width="1.8" opacity="0.88">
      <path d="M80 0 V360"/>
      <path d="M160 0 V360"/>
      <path d="M240 0 V360"/>
      <path d="M320 0 V360"/>
      <path d="M400 0 V360"/>
      <path d="M480 0 V360"/>
      <path d="M560 0 V360"/>
      <path d="M0 60 H640"/>
      <path d="M0 120 H640"/>
      <path d="M0 180 H640"/>
      <path d="M0 240 H640"/>
      <path d="M0 300 H640"/>
    </g>
    <rect x="320" y="180" width="80" height="60" fill="#fde68a" stroke="#ca8a04" stroke-width="4" opacity="0.72"/>
    <circle cx="360" cy="210" r="6" fill="#dc2626" stroke="#ffffff" stroke-width="2"/>
    <text x="332" y="232" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="15" font-weight="700" fill="#713f12">D04</text>
    <rect x="0" y="0" width="640" height="360" rx="8" fill="none" stroke="#0f172a" stroke-width="3"/>
  </g>

  <g transform="translate(744 130)" font-family="Arial, 'Noto Sans TC', sans-serif">
    <rect x="0" y="0" width="170" height="270" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="18" y="34" font-size="18" font-weight="700" fill="#0f172a">方格資料</text>
    <line x1="18" y1="48" x2="152" y2="48" stroke="#e2e8f0" stroke-width="2"/>
    <text x="18" y="78" font-size="14" font-weight="700" fill="#334155">grid_id</text>
    <text x="18" y="100" font-size="15" fill="#2563eb">D04</text>
    <text x="18" y="132" font-size="14" font-weight="700" fill="#334155">中心 GPS</text>
    <text x="18" y="154" font-size="13" fill="#475569">25.012384</text>
    <text x="18" y="174" font-size="13" fill="#475569">121.543276</text>
    <text x="18" y="206" font-size="14" font-weight="700" fill="#334155">用途</text>
    <text x="18" y="228" font-size="13" fill="#475569">快速縮小搜尋</text>
    <text x="18" y="248" font-size="13" fill="#475569">範圍與比對成本</text>
  </g>

  <g transform="translate(74 490)" font-family="Arial, 'Noto Sans TC', sans-serif">
    <rect x="0" y="-18" width="20" height="12" fill="#fde68a" stroke="#ca8a04" stroke-width="2"/>
    <text x="30" y="-7" font-size="13" fill="#475569">黃色方格代表目前車輛可能所在的候選區域</text>
  </g>
</svg>
