<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">辨識車子</title>
  <desc id="desc">示意無人機影像中的車輛偵測結果，模型輸出 bounding box、車輛中心點與偵測信心分數。</desc>
  <defs>
    <linearGradient id="viewBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#dcfce7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="48" y="54" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="28" font-weight="700" fill="#0f172a">3. 辨識車子</text>
  <text x="48" y="86" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="15" fill="#475569">模型在無人機影像中找出車輛框，並取車框中心作為後續定位點。</text>

  <g transform="translate(86 116)" filter="url(#shadow)">
    <rect x="0" y="0" width="610" height="340" rx="8" fill="url(#viewBg)" stroke="#334155" stroke-width="2"/>
    <path d="M-20 250 C120 210 235 225 340 165 C445 105 520 92 640 65" fill="none" stroke="#64748b" stroke-width="70" stroke-linecap="round"/>
    <path d="M-20 250 C120 210 235 225 340 165 C445 105 520 92 640 65" fill="none" stroke="#e2e8f0" stroke-width="6" stroke-dasharray="22 22" stroke-linecap="round"/>
    <path d="M412 340 C405 260 438 202 520 116" fill="none" stroke="#64748b" stroke-width="44" stroke-linecap="round"/>
    <path d="M412 340 C405 260 438 202 520 116" fill="none" stroke="#e2e8f0" stroke-width="5" stroke-dasharray="18 18" stroke-linecap="round"/>
    <g transform="translate(300 178) rotate(-20)">
      <rect x="-24" y="-13" width="48" height="26" rx="5" fill="#1e293b"/>
      <rect x="-16" y="-9" width="15" height="18" rx="2" fill="#475569"/>
      <rect x="4" y="-9" width="15" height="18" rx="2" fill="#475569"/>
      <circle cx="-15" cy="15" r="4" fill="#0f172a"/>
      <circle cx="15" cy="15" r="4" fill="#0f172a"/>
    </g>
    <rect x="262" y="146" width="82" height="62" fill="none" stroke="#dc2626" stroke-width="4"/>
    <circle cx="303" cy="177" r="6" fill="#dc2626" stroke="#ffffff" stroke-width="2"/>
    <line x1="303" y1="177" x2="390" y2="132" stroke="#dc2626" stroke-width="3"/>
    <rect x="390" y="92" width="154" height="56" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <text x="404" y="116" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="15" font-weight="700" fill="#991b1b">car: 0.93</text>
    <text x="404" y="138" font-family="Arial, 'Noto Sans TC', sans-serif" font-size="13" fill="#475569">中心點: (303, 177)</text>
    <rect x="0" y="0" width="610" height="340" rx="8" fill="none" stroke="#0f172a" stroke-width="3"/>
  </g>

  <g transform="translate(730 134)" font-family="Arial, 'Noto Sans TC', sans-serif">
    <rect x="0" y="0" width="174" height="250" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="18" y="34" font-size="18" font-weight="700" fill="#0f172a">偵測輸出</text>
    <line x1="18" y1="48" x2="154" y2="48" stroke="#e2e8f0" stroke-width="2"/>
    <text x="18" y="78" font-size="14" font-weight="700" fill="#334155">類別</text>
    <text x="18" y="100" font-size="14" fill="#475569">vehicle / car</text>
    <text x="18" y="132" font-size="14" font-weight="700" fill="#334155">bounding box</text>
    <text x="18" y="154" font-size="13" fill="#475569">x1=262, y1=146</text>
    <text x="18" y="174" font-size="13" fill="#475569">x2=344, y2=208</text>
    <text x="18" y="206" font-size="14" font-weight="700" fill="#334155">confidence</text>
    <text x="18" y="228" font-size="15" fill="#16a34a">0.93</text>
  </g>
</svg>
